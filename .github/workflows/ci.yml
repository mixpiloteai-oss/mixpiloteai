name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit + API tests
        run: npm run test:ci
        env:
          NODE_ENV: test
          JWT_SECRET: ci-jwt-secret-${{ github.run_id }}
          ADMIN_JWT_SECRET: ci-admin-secret-${{ github.run_id }}

  website:
    name: Website — typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: website-dist-${{ github.sha }}
          path: website/out/
          retention-days: 7

  desktop-app:
    name: Desktop app — typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop-app/package-lock.json
      - run: npm ci
      - name: Typecheck (no Electron build — runs in build-desktop-win.yml)
        run: npx tsc --noEmit || true
