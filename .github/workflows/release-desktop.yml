name: Release Desktop App

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (otherwise read from desktop-app/package.json)'
        required: false
      draft:
        description: 'Publish as a draft release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: 'AppImage,deb'
          - os: windows-latest
            artifact: 'nsis,portable'
          - os: macos-latest
            artifact: 'dmg,zip'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        working-directory: desktop-app
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Mac signing
      CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # Windows signing
      WIN_CSC_LINK: ${{ secrets.WIN_CERT_PFX_BASE64 }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop-app/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build renderer
        run: npm run build
      - name: Package + sign + publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.draft }}" = "true" ]; then
            npx electron-builder --publish=never
          else
            npx electron-builder --publish=always
          fi
        shell: bash
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}-${{ github.sha }}
          path: |
            desktop-app/dist/*.exe
            desktop-app/dist/*.dmg
            desktop-app/dist/*.zip
            desktop-app/dist/*.AppImage
            desktop-app/dist/*.deb
            desktop-app/dist/*.blockmap
            desktop-app/dist/latest*.yml
          retention-days: 30
          if-no-files-found: warn

  github-release:
    name: Promote to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ inputs.draft || true }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
