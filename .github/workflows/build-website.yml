name: Build Website

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'website/**'
  pull_request:
    paths:
      - 'website/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist/
