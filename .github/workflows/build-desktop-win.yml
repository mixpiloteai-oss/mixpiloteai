name: Build Desktop (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0-beta.1)'
        required: false
        default: ''

jobs:
  build-win:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            electron/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Windows installer
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --x64

      - name: List release artifacts
        working-directory: electron/release
        run: dir

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: NeuroTek-AI-Win64-Setup
          path: electron/release/NeuroTek-AI-Setup-*.exe
          if-no-files-found: warn

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: NeuroTek-AI-Win64-Portable
          path: electron/release/NeuroTek-AI-Portable-*.exe
          if-no-files-found: warn
