# ============================================================
# NEUROTEK AI — Production Docker Compose
# ============================================================
# Usage:
#   cp backend/.env.example backend/.env
#   # Fill in real values in backend/.env
#   docker compose -f docker-compose.production.yml up -d
#
# Services:
#   backend   — Node.js API (port 8080 internal, exposed via nginx)
#   nginx     — Reverse proxy + SSL termination (ports 80 / 443)
# ============================================================

version: '3.9'

services:
  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: neurotek-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 8080
    expose:
      - "8080"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Resource limits (adjust per server size)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: neurotek-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  nginx_logs:
